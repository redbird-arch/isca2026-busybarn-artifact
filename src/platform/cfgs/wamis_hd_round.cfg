[time_unit]
# set 0.5 ns as the time unit for Dojo works at 2 GHz (the maximum frequency of Dojo which decides the time unit)
frequency = 1

[topology]
chiplet_number = 4
chiplet_rows = 2
chiplet_columns = 2
core_number = 4
core_rows = 2
core_columns = 2
tensorcore_number = 1
vectorunit_number = 1
sram_number = 1
ddr_number = 1
topology_type = tlm

[tensorcore_cfg]
tensorcore_type = multree
# Matmul: [M, K] * [K, N] = [M, N] -> 
# Tensorcore_grain: [K, M*N]
# [128, 256] -> 64 TFLOPs@1GHz
# [128, 64] -> 16 TFLOPs@1GHz
tensorcore_grain = [128, 128]
tensorcore_timeunit = 1

[vectorunit_cfg]
vectorunit_type = simd
vectorunit_grain = [1024]
vectorunit_timeunit = 1
eleadd_complexity = 1
eleexp_complexity = 2
elegelu_complexity = 8
elemul_complexity = 1
elepow2_complexity = 1
elerelu_complexity = 2
elesqrt_complexity = 4
matadd_complexity = 1
redmax_complexity = 1
redsum_complexity = 1
vecadd_complexity = 1
vecdiv_complexity = 4
vecmac_complexity = 1
vecmul_complexity = 1
transpose_complexity = 1
lookup_complexity = 1

[co2co_cfg]
co2co_latency = 1
# 1 TB bandwidth 
co2co_bandwidth = 256
co2co_timeunit = 1

[ch2ch_cfg]
ch2ch_latency = 20
ch2ch_bandwidth = 256
ch2ch_timeunit = 1

[sram_cfg]
# 16 MB
sram_capacity = 16777216

[ddr_cfg]
# 32 GB = 4 * HBM2
ddr_capacity = 34359738368

[co2ddr_cfg]
co2ddr_latency = 50
co2ddr_bandwidth = 256
co2ddr_timeunit = 1

[ddr2co_cfg]
ddr2co_latency = 50
ddr2co_bandwidth = 256
ddr2co_timeunit = 1


[failures]
failed_nodes = []
failed_links = [((1, 2), (3, 0)), ((3, 0), (1, 2))]

